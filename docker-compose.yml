version: '3.8'

volumes:
  HNG-nginx-logs:

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: always
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx

  detector:
    build: ./detector
    network_mode: "host"
    privileged: true
    # Remove 'ports:' if using network_mode: host, as it opens all ports automatically
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
